<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dikiş Atölyem</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Mono:wght@400;500&display=swap');

  :root{
    --bg:#f6f4ef;          /* neredeyse beyaz, çok açık gri */
    --paper:#ffffff;
    --ink:#2a2620;
    --muted:#8a8170;
    --line:#e6ded0;
    --thread:#c1492e;
    --thread-soft:#e0a596;
    --gold:#b8893b;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;min-height:100%;}
  html{background:var(--bg);}
  body{
    font-family:'DM Mono',monospace;
    background:var(--bg);
    min-height:100vh;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:contain;
  }

  /* ---- HEADER (sıkıştırılmış) ---- */
  header{
    background:var(--bg);
    padding:10px 14px 0;
  }
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:40px;}
  .title{
    font-family:'Fraunces',serif; font-weight:600; font-size:21px;
    letter-spacing:-.5px; display:flex; align-items:center; gap:7px; line-height:1;
  }
  .title .needle{color:var(--thread); font-size:17px; transform:rotate(-20deg); display:inline-block;}
  .count{font-size:11px; color:var(--muted); margin-left:6px; font-weight:400;}
  .search-btn{
    width:38px; height:38px; border-radius:50%; border:1.5px solid var(--line);
    background:var(--paper); display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex:0 0 auto; color:var(--ink);
  }
  .search-btn.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  /* açılır arama */
  .searchwrap{max-height:0; overflow:hidden; transition:max-height .22s ease;}
  .searchwrap.open{max-height:60px;}
  .searchbar{
    margin-top:10px; display:flex; gap:8px; align-items:center;
    background:var(--paper); border:1.5px solid var(--line); border-radius:11px; padding:9px 12px;
  }
  .searchbar input{
    border:none; background:transparent; outline:none; flex:1;
    font-family:'DM Mono',monospace; font-size:15px; color:var(--ink);
  }

  /* ---- CHIPS (sticky, ince) ---- */
  .chips{
    position:sticky; top:0; z-index:30;
    display:flex; gap:7px; overflow-x:auto;
    padding:10px 14px 11px;
    background:var(--bg);
    scrollbar-width:none; -ms-overflow-style:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; padding:6px 13px; border-radius:18px;
    border:1.5px solid var(--line); background:var(--paper);
    font-size:12.5px; font-weight:500; color:var(--ink);
    cursor:pointer; transition:.15s; white-space:nowrap;
    display:flex; align-items:center; gap:6px;
  }
  .chip.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .chip .dot{width:7px;height:7px;border-radius:50%;}
  .chip-add{
    flex:0 0 auto; width:34px; padding:6px 0; border-radius:18px;
    border:1.5px dashed var(--thread); background:transparent;
    color:var(--thread); font-size:16px; cursor:pointer; line-height:1;
  }

  /* ---- GRID (Instagram: boşluksuz, kare, overlay) ---- */
  main{padding:0 0 110px; background:var(--bg); min-height:80vh;}
  .grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:2px;
  }
  .card{
    position:relative; aspect-ratio:1; overflow:hidden;
    cursor:pointer; background:var(--line); animation:fade .25s ease;
  }
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .card .photo{width:100%; height:100%; object-fit:cover; display:block;}
  .card .nophoto{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    background:repeating-linear-gradient(45deg,#efe8da,#efe8da 7px,#f6f1e7 7px,#f6f1e7 14px);
    color:var(--muted); font-size:26px;
  }
  /* kategori noktası — sağ üst */
  .card .cat-dot{
    position:absolute; top:6px; right:6px; width:12px; height:12px;
    border-radius:50%; border:2px solid rgba(255,255,255,.85);
    box-shadow:0 1px 3px rgba(0,0,0,.3);
  }
  /* isim+miktar overlay — alt, görselin üstüne biner */
  .card .overlay{
    position:absolute; left:0; right:0; bottom:0;
    padding:16px 8px 7px;
    background:linear-gradient(to top, rgba(0,0,0,.72), rgba(0,0,0,.32) 60%, transparent);
    color:#fff;
  }
  .card .ov-name{
    font-family:'Fraunces',serif; font-weight:600; font-size:13px;
    line-height:1.15; margin:0; text-shadow:0 1px 3px rgba(0,0,0,.5);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .card .ov-qty{
    font-size:11px; margin-top:2px; opacity:.95; font-weight:500;
    text-shadow:0 1px 2px rgba(0,0,0,.6);
  }

  .empty{text-align:center; padding:70px 30px; color:var(--muted);}
  .empty .big{font-size:42px; margin-bottom:12px; opacity:.6;}
  .empty p{font-size:14px; line-height:1.5;}

  /* ---- FAB ---- */
  .fab{
    position:fixed; bottom:24px; right:18px; z-index:40;
    width:60px; height:60px; border-radius:50%;
    background:var(--thread); color:#fff; border:none;
    font-size:31px; line-height:1; cursor:pointer;
    box-shadow:0 6px 20px rgba(193,73,46,.45);
    display:flex; align-items:center; justify-content:center; transition:transform .15s;
  }
  .fab:active{transform:scale(.9);}

  /* ---- SHEETS ---- */
  .overlay{
    position:fixed; inset:0; z-index:50; background:rgba(42,38,32,.45);
    display:none; align-items:flex-end; justify-content:center; animation:fadeBg .2s;
  }
  .overlay.open{display:flex;}
  @keyframes fadeBg{from{opacity:0}to{opacity:1}}
  .sheet{
    background:var(--paper); width:100%; max-width:520px;
    border-radius:22px 22px 0 0; padding:8px 20px 28px;
    max-height:92vh; overflow-y:auto; animation:slideup .28s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .grabber{width:42px;height:5px;border-radius:3px;background:var(--line);margin:8px auto 18px;}
  .sheet h2{font-family:'Fraunces',serif; font-weight:600; font-size:22px; margin:0 0 16px;}
  label{display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; letter-spacing:.5px;}
  input[type=text], input[type=number], select{
    width:100%; padding:13px 14px; border:1.5px solid var(--line);
    border-radius:12px; background:var(--bg); font-family:'DM Mono',monospace;
    font-size:16px; color:var(--ink); outline:none;
  }
  input:focus, select:focus{border-color:var(--thread);}
  .row{display:flex; gap:10px;} .row > div{flex:1;}

  .photopick{
    margin-top:6px; width:100%; aspect-ratio:16/10; border-radius:14px;
    border:2px dashed var(--line); background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--muted); cursor:pointer; overflow:hidden; position:relative;
  }
  .photopick img{width:100%;height:100%;object-fit:cover;}
  .photopick .ph-icon{font-size:34px;}
  .photopick .ph-txt{font-size:12px; margin-top:6px;}
  .photopick .retake{position:absolute; bottom:8px; right:8px; background:rgba(42,38,32,.8); color:#fff; font-size:11px; padding:5px 10px; border-radius:8px;}

  .catpills{display:flex; gap:8px; flex-wrap:wrap; margin-top:4px;}
  .catpill{padding:9px 14px; border-radius:12px; border:1.5px solid var(--line); background:var(--bg); font-size:13px; cursor:pointer; display:flex; gap:6px; align-items:center;}
  .catpill.sel{border-color:var(--ink); background:var(--ink); color:#fff;}
  .catpill .dot{width:8px;height:8px;border-radius:50%;}

  .actions{display:flex; gap:10px; margin-top:24px;}
  .btn{flex:1; padding:15px; border-radius:14px; border:none; cursor:pointer; font-family:'DM Mono',monospace; font-size:15px; font-weight:500;}
  .btn-primary{background:var(--thread); color:#fff;}
  .btn-ghost{background:var(--bg); color:var(--ink); border:1.5px solid var(--line);}
  .btn-danger{background:transparent; color:var(--thread); border:1.5px solid var(--thread-soft);}
  .btn:active{opacity:.8;}
  .qty-unit{font-size:12px; color:var(--muted); margin-top:6px;}

  .detail-photo{width:100%; border-radius:16px; margin-bottom:16px; display:block;}
  .detail-row{display:flex; justify-content:space-between; padding:13px 0; border-bottom:1px dashed var(--line); font-size:14px;}
  .detail-row .k{color:var(--muted);} .detail-row .v{font-weight:500;}

  .catmanage-item{display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px dashed var(--line);}
  .catmanage-item .dot{width:14px;height:14px;border-radius:50%;flex:0 0 auto;}
  .catmanage-item span{flex:1; font-size:15px;}
  .catmanage-item button{background:none;border:none;color:var(--thread);font-size:18px;cursor:pointer;padding:4px 8px;}
</style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="title"><span class="needle">⚲</span> Dikiş Atölyem<span class="count" id="countLabel"></span></div>
    <button class="search-btn" id="searchBtn" aria-label="ara">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    </button>
  </div>
  <div class="searchwrap" id="searchwrap">
    <div class="searchbar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="search" placeholder="keten, mavi, düğme...">
    </div>
  </div>
</header>

<div class="chips" id="chips"></div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">
    <div class="big">🧵</div>
    <p id="emptyText">Henüz parça eklemedin.<br>Sağ alttaki <b>+</b> ile başla.</p>
  </div>
</main>

<button class="fab" id="fab">+</button>

<!-- ADD/EDIT -->
<div class="overlay" id="formOverlay">
  <div class="sheet">
    <div class="grabber"></div>
    <h2 id="formTitle">Yeni parça</h2>
    <label>Fotoğraf</label>
    <div class="photopick" id="photopick">
      <div class="ph-icon">📷</div><div class="ph-txt">Fotoğraf çek / seç</div>
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none;">
    <label>İsim</label>
    <input type="text" id="fName" placeholder="ör. Çiçekli pamuk, Sedef düğme">
    <label>Kategori</label>
    <div class="catpills" id="catpills"></div>
    <div class="row">
      <div><label>Miktar</label><input type="number" id="fQty" placeholder="0" min="0" step="0.1"><div class="qty-unit" id="qtyUnit"></div></div>
      <div><label>Tip / cins</label><input type="text" id="fType" placeholder="ör. pamuk, sedef, 20cm"></div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="formCancel">Vazgeç</button>
      <button class="btn btn-primary" id="formSave">Kaydet</button>
    </div>
  </div>
</div>

<!-- DETAIL -->
<div class="overlay" id="detailOverlay"><div class="sheet" id="detailSheet"><div class="grabber"></div></div></div>

<!-- MANAGE CATEGORIES -->
<div class="overlay" id="catOverlay">
  <div class="sheet">
    <div class="grabber"></div>
    <h2>Kategoriler</h2>
    <div id="catManageList"></div>
    <label>Yeni kategori</label>
    <div class="row">
      <div style="flex:2;"><input type="text" id="newCatName" placeholder="ör. Astar, Tela"></div>
      <div style="flex:0 0 70px;"><input type="color" id="newCatColor" value="#6a8e7f" style="height:48px;padding:4px;cursor:pointer;"></div>
    </div>
    <label style="margin-top:10px;">Birim (miktar için)</label>
    <input type="text" id="newCatUnit" placeholder="ör. metre, adet, makara">
    <div class="actions">
      <button class="btn btn-ghost" id="catClose">Kapat</button>
      <button class="btn btn-primary" id="catAdd">Ekle</button>
    </div>

    <div style="border-top:1px dashed var(--line); margin-top:24px; padding-top:20px;">
      <h2 style="font-size:18px; margin-bottom:6px;">Yedekleme</h2>
      <p style="font-size:12px; color:var(--muted); margin:0 0 14px; line-height:1.5;">
        Verilerin bu cihazın tarayıcısında. Tarayıcı temizlenirse silinir — ara ara yedek al, başka cihaza taşı.
      </p>
      <div class="actions" style="margin-top:0;">
        <button class="btn btn-ghost" id="exportBtn">↓ Yedek al</button>
        <button class="btn btn-ghost" id="importBtn">↑ Yedek yükle</button>
      </div>
      <input type="file" id="importInput" accept="application/json,.json" style="display:none;">
    </div>
  </div>
</div>

<script>
/* ---------- STORAGE ---------- */
const DB_NAME='dikis_db', STORE='items', META='meta';
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);
  r.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE,{keyPath:'id'});
    if(!d.objectStoreNames.contains(META)) d.createObjectStore(META,{keyPath:'key'});};
  r.onsuccess=e=>{db=e.target.result;res();}; r.onerror=e=>rej(e);});}
function tx(s,m){return db.transaction(s,m).objectStore(s);}
function getAll(s){return new Promise(res=>{const r=tx(s,'readonly').getAll();r.onsuccess=()=>res(r.result);});}
function put(s,v){return new Promise(res=>{const r=tx(s,'readwrite').put(v);r.onsuccess=()=>res();});}
function del(s,k){return new Promise(res=>{const r=tx(s,'readwrite').delete(k);r.onsuccess=()=>res();});}
function getMeta(k){return new Promise(res=>{const r=tx(META,'readonly').get(k);r.onsuccess=()=>res(r.result?r.result.value:null);});}
function setMeta(k,v){return put(META,{key:k,value:v});}

let items=[], categories=[], activeCat='all', searchQ='', editingId=null, pendingPhoto=null;
const DEFAULT_CATS=[
  {id:'kumas',name:'Kumaş',color:'#c1492e',unit:'metre'},
  {id:'dugme',name:'Düğme',color:'#b8893b',unit:'adet'},
  {id:'fermuar',name:'Fermuar',color:'#6a8e7f',unit:'adet'},
  {id:'iplik',name:'İplik',color:'#5b6c9e',unit:'makara'}
];

(async function(){
  await openDB();
  categories=await getMeta('categories');
  if(!categories){categories=DEFAULT_CATS;await setMeta('categories',categories);}
  items=await getAll(STORE);
  render(); renderChips();
})();

const $=id=>document.getElementById(id);
function catById(id){return categories.find(c=>c.id===id)||{name:'?',color:'#999',unit:''};}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return (s+'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

function compress(file){return new Promise(res=>{
  const img=new Image(), rd=new FileReader();
  rd.onload=()=>img.src=rd.result;
  img.onload=()=>{const max=900;let{width:w,height:h}=img;
    if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.78));};
  rd.readAsDataURL(file);});}

/* ---------- GRID ---------- */
function render(){
  const grid=$('grid'), empty=$('empty');
  let list=items.slice().sort((a,b)=>b.created-a.created);
  if(activeCat!=='all') list=list.filter(i=>i.cat===activeCat);
  if(searchQ){const q=searchQ.toLowerCase();
    list=list.filter(i=>(i.name||'').toLowerCase().includes(q)||(i.type||'').toLowerCase().includes(q)||catById(i.cat).name.toLowerCase().includes(q));}
  $('countLabel').textContent=items.length?('· '+items.length):'';
  if(list.length===0){grid.innerHTML='';empty.style.display='block';
    $('emptyText').innerHTML=(items.length===0)?'Henüz parça eklemedin.<br>Sağ alttaki <b>+</b> ile başla.':'Bu filtreyle eşleşen yok.';return;}
  empty.style.display='none';
  grid.innerHTML=list.map(i=>{
    const c=catById(i.cat);
    const photo=i.photo?`<img class="photo" src="${i.photo}" alt="">`:`<div class="nophoto">✂</div>`;
    const qty=(i.qty!==''&&i.qty!=null)?`<div class="ov-qty">${i.qty} ${c.unit}</div>`:'';
    return `<div class="card" data-id="${i.id}">
      ${photo}
      <span class="cat-dot" style="background:${c.color}"></span>
      <div class="overlay">
        <p class="ov-name">${esc(i.name||'İsimsiz')}</p>${qty}
      </div></div>`;
  }).join('');
  grid.querySelectorAll('.card').forEach(el=>el.onclick=()=>openDetail(el.dataset.id));
}

/* ---------- CHIPS ---------- */
function renderChips(){
  const wrap=$('chips');
  let html=`<button class="chip ${activeCat==='all'?'active':''}" data-cat="all">Hepsi</button>`;
  html+=categories.map(c=>`<button class="chip ${activeCat===c.id?'active':''}" data-cat="${c.id}"><span class="dot" style="background:${c.color}"></span>${c.name}</button>`).join('');
  html+=`<button class="chip-add" id="manageCats">⚙</button>`;
  wrap.innerHTML=html;
  wrap.querySelectorAll('.chip').forEach(el=>el.onclick=()=>{activeCat=el.dataset.cat;render();renderChips();});
  $('manageCats').onclick=openCatManage;
}

/* ---------- SEARCH TOGGLE ---------- */
$('searchBtn').onclick=()=>{
  const w=$('searchwrap'); const open=w.classList.toggle('open');
  $('searchBtn').classList.toggle('active',open);
  if(open){setTimeout(()=>$('search').focus(),150);}
  else{$('search').value='';searchQ='';render();}
};
$('search').oninput=e=>{searchQ=e.target.value;render();};

/* ---------- FORM ---------- */
function renderCatPills(sel){
  $('catpills').innerHTML=categories.map(c=>`<div class="catpill ${sel===c.id?'sel':''}" data-cat="${c.id}"><span class="dot" style="background:${c.color}"></span>${c.name}</div>`).join('');
  $('catpills').querySelectorAll('.catpill').forEach(el=>el.onclick=()=>{
    $('catpills').querySelectorAll('.catpill').forEach(p=>p.classList.remove('sel'));
    el.classList.add('sel');updateQtyUnit(el.dataset.cat);});
}
function selectedCat(){const s=$('catpills').querySelector('.catpill.sel');return s?s.dataset.cat:categories[0].id;}
function updateQtyUnit(id){$('qtyUnit').textContent='birim: '+catById(id).unit;}
function openForm(item){
  editingId=item?item.id:null; pendingPhoto=item?item.photo:null;
  $('formTitle').textContent=item?'Düzenle':'Yeni parça';
  $('fName').value=item?item.name:''; $('fQty').value=item?(item.qty??''):''; $('fType').value=item?(item.type||''):'';
  renderCatPills(item?item.cat:categories[0].id); updateQtyUnit(item?item.cat:categories[0].id);
  renderPhotoPick(); $('formOverlay').classList.add('open');
}
function renderPhotoPick(){
  $('photopick').innerHTML=pendingPhoto?`<img src="${pendingPhoto}"><div class="retake">değiştir</div>`:`<div class="ph-icon">📷</div><div class="ph-txt">Fotoğraf çek / seç</div>`;
}
$('photopick').onclick=()=>$('photoInput').click();
$('photoInput').onchange=async e=>{if(e.target.files[0]){pendingPhoto=await compress(e.target.files[0]);renderPhotoPick();}};
$('fab').onclick=()=>openForm(null);
$('formCancel').onclick=()=>$('formOverlay').classList.remove('open');
$('formSave').onclick=async()=>{
  const obj={id:editingId||uid(),name:$('fName').value.trim(),cat:selectedCat(),
    qty:$('fQty').value===''?'':parseFloat($('fQty').value),type:$('fType').value.trim(),
    photo:pendingPhoto,created:editingId?(items.find(i=>i.id===editingId).created):Date.now()};
  if(!obj.name && !obj.photo){alert('En azından bir isim ya da fotoğraf ekle.');return;}
  await put(STORE,obj); items=await getAll(STORE);
  $('formOverlay').classList.remove('open'); render();
};

/* ---------- DETAIL ---------- */
function openDetail(id){
  const i=items.find(x=>x.id===id); if(!i)return; const c=catById(i.cat);
  const photo=i.photo?`<img class="detail-photo" src="${i.photo}">`:'';
  $('detailSheet').innerHTML=`<div class="grabber"></div>${photo}
    <h2>${esc(i.name||'İsimsiz')}</h2>
    <div class="detail-row"><span class="k">Kategori</span><span class="v" style="color:${c.color}">${c.name}</span></div>
    <div class="detail-row"><span class="k">Miktar</span><span class="v">${(i.qty!==''&&i.qty!=null)?i.qty+' '+c.unit:'—'}</span></div>
    <div class="detail-row"><span class="k">Tip / cins</span><span class="v">${esc(i.type||'—')}</span></div>
    <div class="actions"><button class="btn btn-danger" id="dDelete">Sil</button><button class="btn btn-ghost" id="dEdit">Düzenle</button></div>`;
  $('detailOverlay').classList.add('open');
  $('dEdit').onclick=()=>{$('detailOverlay').classList.remove('open');openForm(i);};
  $('dDelete').onclick=async()=>{if(confirm(`"${i.name||'Bu parça'}" silinsin mi?`)){await del(STORE,id);items=await getAll(STORE);$('detailOverlay').classList.remove('open');render();}};
}

/* ---------- CATEGORIES ---------- */
function openCatManage(){renderCatManage();$('catOverlay').classList.add('open');}
function renderCatManage(){
  $('catManageList').innerHTML=categories.map(c=>`<div class="catmanage-item"><span class="dot" style="background:${c.color}"></span><span>${c.name} <em style="color:var(--muted);font-style:normal;font-size:12px;">(${c.unit})</em></span>${categories.length>1?`<button data-del="${c.id}">🗑</button>`:''}</div>`).join('');
  $('catManageList').querySelectorAll('button[data-del]').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.del; const used=items.filter(i=>i.cat===id).length;
    if(used>0){alert(`Bu kategoride ${used} parça var. Önce onları taşı ya da sil.`);return;}
    categories=categories.filter(c=>c.id!==id);await setMeta('categories',categories);renderCatManage();renderChips();});
}
$('catAdd').onclick=async()=>{
  const name=$('newCatName').value.trim(); if(!name){alert('Kategori adı gir.');return;}
  categories.push({id:uid(),name,color:$('newCatColor').value,unit:$('newCatUnit').value.trim()||'adet'});
  await setMeta('categories',categories); $('newCatName').value='';$('newCatUnit').value='';
  renderCatManage();renderChips();
};
$('catClose').onclick=()=>$('catOverlay').classList.remove('open');

/* ---------- BACKUP (export / import) ---------- */
$('exportBtn').onclick=()=>{
  const data={version:1, exported:new Date().toISOString(), categories, items};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date().toISOString().slice(0,10);
  a.href=url; a.download=`dikis-atolyem-yedek-${d}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
};
$('importBtn').onclick=()=>$('importInput').click();
$('importInput').onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const rd=new FileReader();
  rd.onload=async()=>{
    try{
      const data=JSON.parse(rd.result);
      if(!data.items||!Array.isArray(data.items)) throw new Error('format');
      const mode=confirm(
        `Yedekte ${data.items.length} parça var.\n\n`+
        `TAMAM = mevcutların üstüne EKLE\nİPTAL = hiçbir şey yapma`
      );
      if(!mode) {e.target.value=''; return;}
      // kategorileri birleştir (id çakışmasın diye var olanı koru, yenileri ekle)
      if(Array.isArray(data.categories)){
        const existIds=new Set(categories.map(c=>c.id));
        data.categories.forEach(c=>{if(!existIds.has(c.id)) categories.push(c);});
        await setMeta('categories',categories);
      }
      // parçaları ekle (yeni id ver, çakışma olmasın)
      for(const it of data.items){
        await put(STORE,{...it, id:uid(), created:it.created||Date.now()});
      }
      items=await getAll(STORE);
      render(); renderChips();
      alert(`${data.items.length} parça yüklendi.`);
      $('catOverlay').classList.remove('open');
    }catch(err){
      alert('Dosya okunamadı. Geçerli bir yedek dosyası seç.');
    }
    e.target.value='';
  };
  rd.readAsText(file);
};

document.querySelectorAll('.overlay').forEach(o=>{o.onclick=e=>{if(e.target===o)o.classList.remove('open');};});
</script>
</body>
</html>
